version: '3.3'

services:
  # Main ChatRaghu backend service (same as production, but with real eval client)
  chatraghu-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - EVALUATION_SERVICE_URL=http://evaluation-service:8001
      - EVALUATION_SERVICE_TIMEOUT=30
      - MOCK_EVAL_CLIENT=false  # Use the REAL client for testing
    depends_on:
      - evaluation-service
    networks:
      - chatraghu-network

  # Evaluation service with test overrides
  evaluation-service:
    build:
      context: ./evals-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./evals-service:/app
      - ./evals-service/eval_results:/app/eval_results
      - ./evals-service/audit_data:/app/audit_data
    env_file:
      - .env
    environment:
      # Test-specific overrides
      - STORAGE_BATCH_SIZE=1 # Write files immediately for tests
      - STORAGE_WRITE_TIMEOUT_SECONDS=5.0
    networks:
      - chatraghu-network

networks:
  chatraghu-network:
    driver: bridge
